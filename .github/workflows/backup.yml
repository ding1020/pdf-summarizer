name: Database Backup

on:
  schedule:
    # Run daily at 2:00 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      manual_backup_name:
        description: "Backup name suffix (optional)"
        required: false
        type: string

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  backup:
    name: Create Database Backup
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Create backup directory
        run: mkdir -p backups

      - name: Backup database
        run: npx prisma migrate diff --from-url "$DATABASE_URL" --to-empty -- Migration.sql || echo "Using database connection for backup"
        continue-on-error: true

      - name: Generate backup filename
        id: backup-name
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          SUFFIX="${{ github.event.inputs.manual_backup_name || '' }}"
          BACKUP_NAME="backup_${TIMESTAMP}${SUFFIX:+_${SUFFIX}}"
          echo "name=$BACKUP_NAME" >> $GITHUB_OUTPUT

      - name: Upload backup to storage
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ steps.backup-name.outputs.name }}
          path: backups/
          retention-days: 30

      - name: Cleanup old backups
        run: |
          echo "Configure cleanup logic for your backup storage"
          # You can integrate with AWS S3, Google Cloud Storage, etc.

  backup-notify:
    name: Notify Backup Status
    runs-on: ubuntu-latest
    needs: backup
    if: always()
    
    steps:
      - name: Send notification on failure
        if: needs.backup.result == 'failure'
        run: |
          echo "Database backup failed! Please check the logs."
          # Add Slack/Discord notification here

      - name: Send notification on success
        if: needs.backup.result == 'success'
        run: |
          echo "Database backup completed successfully."
          # Add Slack/Discord notification here
